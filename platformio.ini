; Stepper Driver Diagnostic Rig
; Target: ESP32-C3 Supermini

[platformio]
default_envs = esp32-c3-supermini

[env:esp32-c3-supermini]
platform       = espressif32
board          = lolin_c3_mini
framework      = arduino
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder, colorize

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    teemuatlut/TMCStepper@^0.7.3
    bblanchon/ArduinoJson@^7.0.4

[env:native]
platform = native
; Only compile the parser for native tests — main.cpp and CLI.cpp need Arduino.
build_src_filter = +<cli/CommandParser.cpp>
